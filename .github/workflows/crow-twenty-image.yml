name: Crow Twenty image

on:
  workflow_dispatch:
    inputs:
      image_name:
        description: Container image name
        required: true
        default: ghcr.io/usecrow/crow-twenty
      image_tag:
        description: Optional human-readable tag to publish in addition to sha-<commit>
        required: false
        default: ""
      app_version:
        description: Semver app version to bake into the image, for example v2.7.3. Keep this aligned with the deployed Twenty release line.
        required: true
        default: v2.7.3

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: Build and publish Twenty image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ inputs.image_name }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=${{ inputs.image_tag }},enable=${{ inputs.image_tag != '' }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: packages/twenty-docker/twenty/Dockerfile
          target: twenty
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            APP_VERSION=${{ inputs.app_version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
